<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的记账本</title>
    <style>
        /* 这里是界面美化（CSS），让它看起来像个手机App */
        body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: auto; background-color: #f4f4f9; }
        h2 { text-align: center; color: #333; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: #007AFF; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 5px;}
        button:active { background-color: #0056b3; }
        .record { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
        .record:last-child { border-bottom: none; }
        .total { font-size: 22px; font-weight: bold; text-align: center; color: #ff3b30; }
        .del-btn { width: auto; padding: 5px 10px; background: #ff3b30; font-size: 12px; margin-left: 10px; border-radius: 5px;}
    </style>
</head>
<body>

    <h2>💰 极简记账</h2>

    <!-- 输入区域 -->
    <div class="card">
        <input type="text" id="itemName" placeholder="花在哪了？(例如：午饭)">
        <input type="number" id="itemAmount" placeholder="花了多少钱？(例如：25)">
        <button onclick="addExpense()">记一笔</button>
    </div>

    <!-- 总计显示区域 -->
    <div class="card">
        <div class="total">总计花费: ¥<span id="totalAmount">0</span></div>
    </div>

    <!-- 历史记录列表 -->
    <div class="card" id="expenseList">
        <!-- 记录会动态显示在这里 -->
    </div>

    <script>
        // 这里是程序的灵魂（JavaScript代码），负责记录和计算

        // 尝试从手机本地存储中读取之前的记录，如果没有则为空数组
        let expenses = JSON.parse(localStorage.getItem('my_expenses')) || [];

        // 更新界面显示的函数
        function updateUI() {
            const list = document.getElementById('expenseList');
            const totalSpan = document.getElementById('totalAmount');
            list.innerHTML = ''; // 清空列表
            let total = 0;

            // 遍历每一笔记录
            expenses.forEach((expense, index) => {
                total += expense.amount; // 累加金额
                // 把记录添加到列表里
                list.innerHTML += `
                    <div class="record">
                        <span>${expense.name}</span>
                        <span>¥${expense.amount} <button class="del-btn" onclick="deleteExpense(${index})">删除</button></span>
                    </div>
                `;
            });
            totalSpan.innerText = total; // 显示总钱数
        }

        // 点击“记一笔”按钮时执行的操作
        function addExpense() {
            const name = document.getElementById('itemName').value;
            const amount = parseFloat(document.getElementById('itemAmount').value);

            if (name === '' || isNaN(amount)) {
                alert('请填写正确的花销名称和金额哦！');
                return;
            }

            // 把新记录存入数据中
            expenses.push({ name: name, amount: amount });
            // 把数据保存到手机本地存储，这样刷新网页记录也不会丢！
            localStorage.setItem('my_expenses', JSON.stringify(expenses));
            
            // 清空输入框
            document.getElementById('itemName').value = '';
            document.getElementById('itemAmount').value = '';
            // 重新刷新界面
            updateUI();
        }

        // 删除记录
        function deleteExpense(index) {
            expenses.splice(index, 1); // 从数据中删掉这一条
            localStorage.setItem('my_expenses', JSON.stringify(expenses)); // 重新保存
            updateUI(); // 重新刷新界面
        }

        // 软件一打开，自动加载之前的记录
        updateUI();
    </script>
</body>
</html>
